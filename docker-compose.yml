services:
  n8n:
    image: n8nio/n8n
    ports:
      - "127.0.0.1:5615:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=password
      - N8N_USER_FOLDER=/home/node/.n8n
      - NODE_FUNCTION_ALLOW_BUILTIN=fs
      - WEBHOOK_URL=http://localhost:5615/
      - N8N_FILESYSTEM_ALLOWLIST=/data
    volumes:
      - .data:/home/node/.n8n
      - D:/EVS/EVS/Images:/data/images
      - D:/EVS/EVS/Reports:/data/reports